<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>🎬 Private TV Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-main: #0a0e17;
            --bg-panel: #111827;
            --bg-list: #1a1f2e;
            --text-main: #ecf0f1;
            --text-muted: #95a5a6;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-yellow: #f1c40f;
            --header-bg: #1f2a38;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            background: var(--bg-panel); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--accent-red); 
            flex-shrink: 0; 
        }
        header h1 { font-size: 1.1rem; }
        header small { color: var(--text-muted); font-style: italic; font-size: 0.8rem; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .player-section { flex: none; height: 35vh; min-height: 220px; background: #000; display: flex; flex-direction: column; width: 100%; }
        .video-container { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        /* Reduced control gap to save space */
        .player-controls { background: var(--bg-panel); padding: 8px 12px; display: flex; gap: 6px; align-items: center; flex-shrink: 0; border-bottom: 1px solid #333; }
        
        /* Reduced button padding and font-size for tight mobile viewports */
        .btn { padding: 6px 12px; border: none; border-radius: 4px; font-weight: bold; font-size: 0.8rem; cursor: pointer; color: white; transition: 0.2s; white-space: nowrap; }
        .btn:active { transform: scale(0.95); }
        
        .btn-stop { background: var(--accent-red); flex-shrink: 0; }
        .btn-back, .btn-next { background: var(--accent-blue); flex-shrink: 0; }
        
        /* Expanded max-width so titles have more room to display in portrait mode */
        .now-playing { margin-left: auto; color: var(--accent-green); font-weight: bold; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; text-align: right; }

        .list-section { width: 100%; flex: 1; display: flex; flex-direction: column; background: var(--bg-main); overflow: hidden; }

        .channel-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; }

        .channel-item { 
            padding: 15px; 
            border-bottom: 1px solid #222; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between;
            align-items: center;
        }
        .channel-item.active { background: #2c1a1a; border-left: 4px solid var(--accent-red); }
        
        .channel-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .channel-title { font-size: 1.1rem; font-weight: bold; }
        .status-badge { font-size: 0.7rem; background: var(--accent-red); color: white; padding: 2px 5px; border-radius: 4px; margin-left: 8px; }

        @media (orientation: landscape) {
            .main-content { flex-direction: row; }
            .player-section { flex: 1.5; height: 100%; border-right: 1px solid #333; }
            .list-section { flex: 1; height: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎬 Private TV Ultimate</h1>
        <small>by ROCKY</small>
    </header>

    <div class="main-content">
        <!-- PLAYER -->
        <div class="player-section">
            <div class="video-container">
                <video id="videoPlayer" controls playsinline muted></video>
            </div>
            <div class="player-controls">
                <button class="btn btn-stop" onclick="stopPlayer()">⏹</button>
                <button class="btn btn-back" onclick="playPrev()">⏮</button>
                <button class="btn btn-next" onclick="playNext()">⏭</button>
                <div class="now-playing" id="nowPlayingText">Not playing</div>
            </div>
        </div>

        <!-- CHANNEL LIST -->
        <div class="list-section">
            <div class="channel-list" id="channelList"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const channelListEl = document.getElementById('channelList');
        const nowPlayingText = document.getElementById('nowPlayingText');
        
        let hls = null;
        let currentPlayingUrl = null;
        let hasInteracted = false;

        const myChannels = [
            {
                name: "Babes TV",
                url: "https://cdn4.skygo.mn/live/disk1/Babes/HLSv3-FTA/Babes.m3u8"
            },
            {
                name: "Eroxxx HD",
                url: "https://webtvstream.bhtelecom.ba/eroxxx.m3u8"
            },
            {
                name: "Yosso TV Sexy",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/14176/index.m3u8"
            },
            {
                name: "Exxxotica HD",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/2397/index.m3u8"
            },
            {
                name: "Русская Ночь",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/147/index.m3u8"
            },
            {
                name: "BCU Charm HD",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/18053/index.m3u8"
            },
            {
                name: "Penthouse Gold HD",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/5011/index.m3u8"
            },
            {
                name: "Кино 18+ HD",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/18075/index.m3u8"
            },
            {
                name: "Playboy TV Europe HD",
                url: "http://eb4b8dcf.kablakaka.ru/iptv/PXXFGKYYT6PCZA/12135/index.m3u8"
            }
        ];

        window.addEventListener('DOMContentLoaded', () => {
            renderChannels();
            if (myChannels.length > 0) {
                playStream(myChannels[0].url, myChannels[0].name);
            }
        });

        document.body.addEventListener('click', () => {
            if (!hasInteracted && video.paused) {
                video.play().catch(e => console.log("Play failed"));
                hasInteracted = true;
            }
        }, { once: true });

        function playPrev() {
            let currentIndex = myChannels.findIndex(ch => ch.url === currentPlayingUrl);
            let prevIndex = (currentIndex - 1 + myChannels.length) % myChannels.length;
            const prevChannel = myChannels[prevIndex];
            playStream(prevChannel.url, prevChannel.name);
        }

        function playNext() {
            let currentIndex = myChannels.findIndex(ch => ch.url === currentPlayingUrl);
            let nextIndex = (currentIndex + 1) % myChannels.length;
            const nextChannel = myChannels[nextIndex];
            playStream(nextChannel.url, nextChannel.name);
        }

        function renderChannels() {
            channelListEl.innerHTML = "";
            myChannels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item' + (ch.url === currentPlayingUrl ? ' active' : '');
                div.innerHTML = `
                    <div class="channel-info">
                        <div class="channel-title">${ch.name} <span class="status-badge">HD</span></div>
                    </div>
                `;
                div.onclick = () => playStream(ch.url, ch.name);
                channelListEl.appendChild(div);
            });
        }

        function playStream(url, name) {
            currentPlayingUrl = url;
            nowPlayingText.innerText = `Connecting...`;
            renderChannels();

            if (hls) {
                hls.destroy();
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: false,
                    manifestLoadingMaxRetry: 10,
                    manifestLoadingRetryDelay: 1000,
                    levelLoadingMaxRetry: 10,
                    levelLoadingRetryDelay: 1000,
                    fragLoadingMaxRetry: 15,
                    fragLoadingRetryDelay: 1000,
                });
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const playPromise = video.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            nowPlayingText.innerText = `⚠️ Tap screen to play`;
                        });
                    }
                    nowPlayingText.innerText = `▶ ${name}`;
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Network drop detected. Reconnecting...");
                                nowPlayingText.innerText = `🔄 Reconnecting...`;
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Media stall detected. Recovering...");
                                hls.recoverMediaError();
                                break;
                            default:
                                console.log("Fatal player error. Restarting stream...");
                                hls.destroy();
                                playStream(url, name);
                                break;
                        }
                    }
                });
            } 
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    nowPlayingText.innerText = `▶ ${name}`;
                });
            }
        }

        function stopPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.src = "";
            currentPlayingUrl = null;
            nowPlayingText.innerText = "Not playing";
            renderChannels();
        }
    </script>
</body>
</html>
